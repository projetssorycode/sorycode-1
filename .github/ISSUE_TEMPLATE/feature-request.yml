name: Feature request
description: Propose an improvement for SoryCode
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the solution you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add examples, screenshots, or extra context if useful.

